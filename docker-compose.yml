version: '3.9'

services:
  backend:
    env_file:
      - .env
    build:
      context: ./BACKEND/backend
    expose:   
      - "8000"
    volumes:
      - ./BACKEND/backend:/app
      - model_cache:/app/cache

  frontend:
    build:
      context: ./FRONTEND/predictor-frontend
    expose:
      - "80"
    depends_on:
      - backend

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend

  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  model_cache:

